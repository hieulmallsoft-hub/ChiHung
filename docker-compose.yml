services:
  postgres:
    image: postgres:16
    container_name: sportshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportshop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
